<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ol-grid — vanilla demo</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: system-ui, sans-serif;
        background: #fff;
        color: #0f172a;
      }

      main {
        max-width: 1100px;
        margin: 2rem auto;
        padding: 0 1rem;
      }

      h1 {
        font-size: 1.25rem;
        font-weight: 600;
        margin: 0 0 0.5rem;
      }

      p {
        margin: 0 0 1rem;
        color: #64748b;
        font-size: 0.875rem;
      }

      .demo-toolbar {
        display: flex;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
        margin-bottom: 12px;
      }

      .demo-toolbar input[type="search"] {
        padding: 6px 10px;
        border: 1px solid #e2e8f0;
        border-radius: 6px;
        font: inherit;
        min-width: 220px;
      }

      .demo-toolbar button {
        padding: 6px 12px;
        border: 1px solid #e2e8f0;
        border-radius: 6px;
        background: #f8fafc;
        font: inherit;
        cursor: pointer;
      }

      .demo-toolbar button:hover {
        background: #eef2f7;
      }

      #status {
        color: #64748b;
        font-size: 0.875rem;
      }

      #grid-host {
        height: 480px;
        max-width: 100%;
        border: 1px solid #e2e8f0;
        border-radius: 8px;
        overflow: hidden;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>ol-grid vanilla demo</h1>
      <p>
        1,000 rows with virtualization, inline editing (Tab navigation, number/select editors, salary
        validation), quick filter, column resize, keyboard nav, and CSV export.
      </p>
      <div class="demo-toolbar">
        <input id="quick-filter" type="search" placeholder="Quick filter…" aria-label="Quick filter" />
        <button id="export-csv" type="button">Export CSV</button>
        <span id="status"></span>
        <span id="last-edit">No edits yet</span>
      </div>
      <div id="grid-host"></div>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
