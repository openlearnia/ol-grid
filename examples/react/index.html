<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ol-grid React Demo</title>
    <style>
      html,
      body,
      #root {
        margin: 0;
        height: 100%;
        font-family: system-ui, sans-serif;
      }

      .demo-shell {
        display: flex;
        flex-direction: column;
        height: 100%;
        padding: 16px;
        box-sizing: border-box;
        gap: 12px;
      }

      .demo-toolbar {
        display: flex;
        align-items: center;
        gap: 16px;
        flex-wrap: wrap;
      }

      .demo-grid {
        flex: 1;
        min-height: 0;
        border: 1px solid #e2e8f0;
        border-radius: 8px;
        overflow: hidden;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
