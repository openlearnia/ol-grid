<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ol-grid 100k row benchmark</title>
    <style>
      body {
        margin: 0;
        font-family: system-ui, sans-serif;
      }
      .toolbar {
        display: flex;
        gap: 1rem;
        align-items: center;
        padding: 0.75rem 1rem;
        border-bottom: 1px solid #ddd;
      }
      #grid-host {
        height: calc(100vh - 52px);
      }
    </style>
  </head>
  <body>
    <div class="toolbar">
      <strong>ol-grid 100k benchmark</strong>
      <span id="status">Generating rows…</span>
      <span id="mount-time"></span>
    </div>
    <div id="grid-host" role="region" aria-label="100k row data grid"></div>
    <script type="module" src="/main.ts"></script>
  </body>
</html>
